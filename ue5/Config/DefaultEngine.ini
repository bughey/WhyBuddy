[/Script/Engine.RendererSettings]
; 启用 Lumen 全局光照
r.DynamicGlobalIlluminationMethod=1
; 启用 Lumen 反射
r.ReflectionMethod=1
; 启用虚拟阴影贴图
r.Shadow.Virtual.Enable=1

[/Script/Engine.Engine]
bSmoothFrameRate=True
MinDesiredFrameRate=30.000000
SmoothedFrameRateRange=(LowerBound=(Type=Inclusive,Value=30.000000),UpperBound=(Type=Exclusive,Value=120.000000))

[/Script/PixelStreamingInfrastructure.PixelStreamingInfrastructureSettings]
; Pixel Streaming 信令服务器默认端口
SignallingServerPort=8888

[PixelStreaming]
; 启用 Pixel Streaming
AllowPixelStreamingCommands=true

[ConsoleVariables]
; Pixel Streaming 编码质量
PixelStreaming.Encoder.MinQP=10
PixelStreaming.Encoder.MaxQP=51
PixelStreaming.Encoder.TargetBitrate=20000000
PixelStreaming.WebRTC.MinBitrate=1000000
PixelStreaming.WebRTC.MaxBitrate=50000000
; 流式传输帧率
PixelStreaming.Encoder.MaxFPS=60

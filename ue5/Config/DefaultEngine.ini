r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.Reflections.Allow=1
r.Lumen.TraceMeshSDFs.Allow=1
r.Lumen.ScreenProbeGather.ScreenSpaceBentNormal=1
; 虚拟纹理
r.VirtualTextures=1
r.VirtualTexturedLightmaps=1

